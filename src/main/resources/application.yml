server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SKILLSWAP_DB_HOST:localhost}:${SKILLSWAP_DB_PORT:5433}/${SKILLSWAP_DB_NAME:skillswap}}
    username: ${SPRING_DATASOURCE_USERNAME:${SKILLSWAP_DB_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SKILLSWAP_DB_PASSWORD:skillswap}}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

skillswap:
  jwt:
    issuer: ${SKILLSWAP_JWT_ISSUER:skillswap}
    secret: ${SKILLSWAP_JWT_SECRET:dev-change-me-dev-change-me-dev-change-me}
    accessTokenMinutes: ${SKILLSWAP_JWT_ACCESS_MINUTES:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info

