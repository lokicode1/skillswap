services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skillswap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: skillswap
    ports:
      - "5433:5432"
    volumes:
      - skillswap_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skillswap"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  skillswap_pg_data:

