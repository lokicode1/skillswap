services:
  - type: web
    name: skillswap-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: SKILLSWAP_DB_HOST
        fromDatabase:
          name: skillswap-db
          property: host
      - key: SKILLSWAP_DB_PORT
        fromDatabase:
          name: skillswap-db
          property: port
      - key: SKILLSWAP_DB_NAME
        fromDatabase:
          name: skillswap-db
          property: database
      - key: SKILLSWAP_DB_USER
        fromDatabase:
          name: skillswap-db
          property: user
      - key: SKILLSWAP_DB_PASSWORD
        fromDatabase:
          name: skillswap-db
          property: password
      - key: SKILLSWAP_JWT_SECRET
        generateValue: true
      - key: SKILLSWAP_JWT_ISSUER
        value: skillswap-render
      - key: SKILLSWAP_JWT_ACCESS_MINUTES
        value: "120"

databases:
  - name: skillswap-db
    databaseName: skillswap
    user: skillswap
    plan: free

